name: Bug Report
description: Report a bug or unexpected behaviour in ProbeShield
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: App Version
      description: Found in Settings → About
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: android
    attributes:
      label: Android Version
      description: Found in Settings → About Phone
      placeholder: e.g. Android 13
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device Model
      placeholder: e.g. Samsung Galaxy S23
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the app
        2. Tap Scan
        3. ...
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Always
        - Sometimes
        - Rarely / Once
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Additional Context / Screenshots
      description: Paste any error messages or attach screenshots here.
